name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: TypeCheck
        run: npm run build --workspace=packages/mcp -- --noEmit || npx tsc --noEmit
        working-directory: packages/mcp
      - name: Test
        run: npm test --workspace=packages/mcp
      - name: Build
        run: npm run build --workspace=packages/mcp
